<body><h3>🦟 蚊子 32×32 · 侧视图</h3><canvas id="c" width="640" height="640"></canvas>

<script>
const S=32,X=20,cv=document.getElementById("c"),ctx=cv.getContext("2d");
cv.width=S*X;cv.height=S*X;ctx.imageSmoothingEnabled=false;
function p(r,c,cl){ctx.fillStyle=cl;ctx.fillRect(c*X,r*X,X,X)}

const D="#111111",B="#555555",G="#999999",W="#B3E5FC",H="#FFFFFF",L="#8D6E63",K="#5D4037",E="#F06292",C="#CD6E58";
rect(15,1,16,8,D);p(14,8,D);p(17,8,D);

rect(14,18,17,27,D);rect(15,19,16,26,B);
p(14,21,G);p(15,21,G);p(16,21,G);p(17,21,G);p(14,24,G);p(15,24,G);p(16,24,G);p(17,24,G);p(15,27,G);p(16,27,G);
p(14,28,D);p(15,28,D);p(13,27,D);p(15,29,D);
ln(18,10,22,6,L);ln(22,6,26,8,L);ln(18,13,22,15,L);ln(22,15,26,14,L);ln(18,15,22,17,L);ln(22,17,26,19,L);ln(18,16,22,18,L);ln(22,18,26,20,L);ln(18,20,23,22,L);ln(23,22,27,24,L);ln(18,23,23,25,L);ln(23,25,27,26,L);
[[22,6],[26,8],[22,15],[26,14],[22,17],[26,19],[22,18],[26,20],[23,22],[27,24],[23,25],[27,26]].forEach(([r,c])=>p(r,c,K));
p(14,17,H);p(15,17,H);p(15,20,H);p(16,20,H);p(14,3,G);p(14,6,G);p(17,3,G);p(17,6,G);
</script></body></html>
